services:
  # ── MCP server (stdio, always on) ──────────────────────────────────────────
  supermem-mcp:
    build: .
    command: python mcp_server/server.py
    volumes:
      - ${SUPERMEM_VAULT_PATH:-./memory/mcp-server}:/vault:rw
      - supermem-data:/data
    env_file:
      - .env
    environment:
      - SUPERMEM_VAULT_PATH=/vault
      - SUPERMEM_DB_PATH=/data/supermem.db
      - SUPERMEM_KUZU_PATH=/data/graph
      - MCP_TRANSPORT=stdio
    restart: unless-stopped

  # ── Worker HTTP API (optional — enable with --profile worker) ──────────────
  supermem-worker:
    build: .
    command: python -m worker.app
    ports:
      - "${SUPERMEM_WORKER_PORT:-37777}:37777"
    volumes:
      - ${SUPERMEM_VAULT_PATH:-./memory/mcp-server}:/vault:rw
      - supermem-data:/data
    env_file:
      - .env
    environment:
      - SUPERMEM_VAULT_PATH=/vault
      - SUPERMEM_DB_PATH=/data/supermem.db
      - SUPERMEM_KUZU_PATH=/data/graph
      - SUPERMEM_WORKER_HOST=0.0.0.0
      - SUPERMEM_WORKER_PORT=37777
    restart: unless-stopped
    profiles:
      - worker
    depends_on:
      - supermem-mcp

volumes:
  supermem-data:
    driver: local
